# Minecraft Bot Configuration
# List of Minecraft bots that act as traders for item storage and delivery
#
# WARNING: This file contains passwords and should NOT be committed to version control!
# This file is automatically ignored by git (.gitignore).
#
# Fields:
#   username: Bot's Minecraft username (required)
#   password: Bot password (required)
#   auth: Authentication type - 'online' (Mojang/Microsoft) or 'offline' (required)
#   bot_id: Optional unique identifier (defaults to username if not provided)
#
# Note: UUID is automatically assigned by Minecraft during authentication and does not
#       need to be specified in the configuration.

bots:
  - username: trader1
    password: "change_me"
    auth: online
  
  - username: trader2
    password: "change_me"
    auth: online
  
  - username: trader3
    password: "change_me"
    auth: online