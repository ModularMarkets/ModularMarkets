# Minecraft Items Configuration
# List of valuable and commonly traded items in Minecraft
# Each item has: name, weight (for logistics), and optional info
#
# IMPORTANT: The 'info' field should ONLY contain in-game NBT data relevant
# for identifying items in trading (e.g., custom names, lore, enchantments).
# It must follow the Minecraft NBT specification.
#
# The 'id' field in info is the Minecraft item identifier (e.g., "minecraft:diamond").
# This is required for proper item identification in the game.
#
# For standard items without custom NBT, info should contain only the 'id' field.
# Only include additional NBT data when items have custom names, descriptions, or other
# identifying characteristics that matter for trading.
#
# Common NBT fields:
#   id: "minecraft:item_name"  # Minecraft item identifier (required)
#   display:
#     Name: '{"text":"Custom Item Name"}'  # JSON text component
#     Lore: ['{"text":"Line 1"}', '{"text":"Line 2"}']  # Array of JSON text
#   Enchantments: [...]  # If relevant for trading
#
# See: https://minecraft.wiki/w/Item_format

items:
  # Ores and Minerals
  # Standard items without custom NBT - info contains only the id field
  - name: diamond
    weight: 1
    info:
      id: "minecraft:diamond"
  
  - name: emerald
    weight: 1
    info:
      id: "minecraft:emerald"
  
  - name: gold_ingot
    weight: 1
    info:
      id: "minecraft:gold_ingot"
  
  - name: iron_ingot
    weight: 1
    info:
      id: "minecraft:iron_ingot"
  
  - name: netherite_ingot
    weight: 1
    info:
      id: "minecraft:netherite_ingot"
  
  - name: ancient_debris
    weight: 1
    info:
      id: "minecraft:ancient_debris"
  
  # Food and Consumables
  - name: golden_apple
    weight: 1
    info:
      id: "minecraft:golden_apple"
  
  - name: enchanted_golden_apple
    weight: 1
    info:
      id: "minecraft:enchanted_golden_apple"
  
  - name: experience_bottle
    weight: 1
    info:
      id: "minecraft:experience_bottle"
  
  # Redstone Components
  - name: redstone
    weight: 1
    info:
      id: "minecraft:redstone"
  
  - name: redstone_block
    weight: 9
    info:
      id: "minecraft:redstone_block"
  
  - name: observer
    weight: 1
    info:
      id: "minecraft:observer"
  
  # Building Materials
  - name: beacon
    weight: 1
    info:
      id: "minecraft:beacon"
  
  - name: shulker_box
    weight: 64
    info:
      id: "minecraft:shulker_box"
  
